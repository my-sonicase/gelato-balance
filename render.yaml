services:
  - type: web
    name: gelato-balance
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install && pnpm run build
    startCommand: pnpm --filter @workspace/db push-force && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
