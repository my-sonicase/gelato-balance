kind = "web"
previewPath = "/"
title = "Gelato Balancer"
version = "1.0.0"
id = "artifacts/gelato-balancer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23684

[services.development]
run = "pnpm --filter @workspace/gelato-balancer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gelato-balancer", "run", "build" ]
publicDir = "artifacts/gelato-balancer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23684"
BASE_PATH = "/"
